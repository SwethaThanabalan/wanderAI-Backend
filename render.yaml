services:
  - type: web
    name: wanderai-backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: APP_ENV
        value: production

      - key: PUBLIC_API_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: QSTASH_TOKEN
        sync: false

      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false

      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false

      - key: SENTRY_DSN
        sync: false

      - key: LOG_LEVEL
        value: INFO
